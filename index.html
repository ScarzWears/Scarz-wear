
<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SCARZ</title>

<style>

body{
margin:0;
font-family:Arial;
background:black;
color:white;
}

/* NAVBAR */

nav{
display:flex;
justify-content:space-between;
padding:20px 40px;
background:black;
border-bottom:1px solid #222;
}

nav a{
color:white;
text-decoration:none;
margin-left:20px;
font-size:14px;
}

/* HERO SECTION */

.hero{
height:90vh;
background:url("hero.png") center/cover;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.hero h1{
font-size:60px;
letter-spacing:5px;
}

.hero button{
padding:15px 40px;
background:maroon;
border:none;
color:white;
font-size:16px;
cursor:pointer;
}

/* PRODUCT GRID */

.products{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:40px;
padding:60px;
}

.product{
text-align:center;
}

.product img{
width:100%;
transition:0.3s;
}

.product img:hover{
transform:scale(1.05);
}

button{
background:white;
border:none;
padding:10px 20px;
margin-top:10px;
cursor:pointer;
}

</style>

</head>

<body>

<!-- NAVBAR -->

<nav>

<h2>SCARZ</h2>

<div>
<a href="index.html">Home</a>
<a href="#shop">Shop</a>
<a href="contact.html">Contact</a>
</div>

</nav>

<!-- HERO SECTION -->

<section class="hero">

<h1>SCARZ</h1>
<p>Premium Streetwear</p>

<button>SHOP NOW</button>

</section>

<!-- PRODUCTS -->

<section id="shop" class="products">
<div class="product"> 
<a href="scarzjeans.html">
<img src="scarzjeans.PNG">
</a>

<h3>Scarz Jeans</h3>
<p>₦45,000</p>
<button>Add to Cart</button>

</div>

<div class="product">
<img src="cap.jpg">
<h3>Scarz Cap</h3>
<p>$40</p>
<button>Add to Cart</button>
</div>

</section>

</body>

</html>
